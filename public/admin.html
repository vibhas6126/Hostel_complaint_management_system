<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Hostel Complaint System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #db2777;
            --secondary-color: #be185d;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fbcfe8 0%, #f472b6 50%, #db2777 100%);
            background-size: 200% 200%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1f2937;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: var(--glass-shadow);
            overflow: hidden;
            transform: translateY(0);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            background: rgba(255, 255, 255, 0.3);
            border-bottom: 1px solid var(--glass-border);
            padding: 25px;
            text-align: center;
        }

        .card-header h3 {
            margin: 0;
            font-weight: 800;
            color: var(--primary-color);
        }

        .card-body {
            padding: 40px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(219, 39, 119, 0.25);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.4s ease;
            box-shadow: 0 5px 15px rgba(219, 39, 119, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(219, 39, 119, 0.5);
        }

        .hidden {
            display: none !important;
        }

        .text-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .text-link:hover {
            color: var(--secondary-color);
            text-decoration: underline;
        }

        .password-toggle {
            cursor: pointer;
        }
        
        /* Toast Notification Styles */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .custom-toast {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 15px 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 350px;
        }

        .custom-toast.show {
            transform: translateX(0);
        }

        .custom-toast .icon {
            font-size: 1.5rem;
        }

        .custom-toast.success .icon { color: #10b981; }
        .custom-toast.danger .icon { color: #ef4444; }
        .custom-toast.info .icon { color: #3b82f6; }

        .custom-toast .message {
            flex-grow: 1;
            font-weight: 500;
            color: #1f2937;
        }

        .custom-toast .close-btn {
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            padding: 0;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <!-- Login Page -->
    <div class="login-container" id="loginPage">
        <div class="login-card">
            <div class="card-header">
                <h3><i class="fas fa-user-shield"></i> Admin Login</h3>
            </div>
            <div class="card-body">
                <form id="loginForm">
                    <div class="mb-4">
                        <label for="username" class="form-label fw-bold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 border" style="border-radius: 15px 0 0 15px;"><i class="fas fa-user text-muted"></i></span>
                            <input type="text" class="form-control border-start-0" id="username" placeholder="Enter your username" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 border" style="border-radius: 15px 0 0 15px;"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" class="form-control border-start-0" id="password" placeholder="Enter your password" required>
                            <span class="input-group-text bg-transparent border-start-0 border password-toggle" style="border-radius: 0 15px 15px 0;" onclick="togglePassword('password', this)"><i class="fas fa-eye text-muted"></i></span>
                        </div>
                    </div>
                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt me-2"></i> Login
                        </button>
                    </div>
                </form>
                
                <div class="mt-4 text-center">
                    <p class="mb-2 text-muted">Don't have an account? <a href="#" id="showRegister" class="text-link">Register Here</a></p>
                    <div class="alert alert-info py-2 px-3 d-inline-block" style="background: rgba(255,255,255,0.5); border: 1px solid var(--glass-border); border-radius: 10px;">
                        <small><i class="fas fa-info-circle"></i> Sample: <strong>admin1</strong> / <strong>password123</strong></small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Register Page -->
    <div class="login-container hidden" id="registerPage">
        <div class="login-card" style="max-width: 500px; margin: 20px 0;">
            <div class="card-header">
                <h3><i class="fas fa-user-plus"></i> Admin Registration</h3>
            </div>
            <div class="card-body">
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="regUsername" class="form-label fw-bold">Username</label>
                        <input type="text" class="form-control" id="regUsername" placeholder="Choose username" required>
                    </div>
                    <div class="mb-3">
                        <label for="regEmail" class="form-label fw-bold">Email Address</label>
                        <input type="email" class="form-control" id="regEmail" placeholder="your.email@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="regFullName" class="form-label fw-bold">Full Name</label>
                        <input type="text" class="form-control" id="regFullName" placeholder="Enter your full name" required>
                    </div>
                    <div class="mb-3">
                        <label for="regPhoneNumber" class="form-label fw-bold">Phone Number (Optional)</label>
                        <input type="tel" class="form-control" id="regPhoneNumber" placeholder="e.g., 555-0123">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="regPassword" class="form-label fw-bold">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control border-end-0" id="regPassword" placeholder="Min 6 chars" required>
                                <span class="input-group-text bg-transparent border-start-0 border password-toggle" style="border-radius: 0 15px 15px 0;" onclick="togglePassword('regPassword', this)"><i class="fas fa-eye text-muted"></i></span>
                            </div>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label for="regConfirmPassword" class="form-label fw-bold">Confirm</label>
                            <div class="input-group">
                                <input type="password" class="form-control border-end-0" id="regConfirmPassword" placeholder="Re-enter" required>
                                <span class="input-group-text bg-transparent border-start-0 border password-toggle" style="border-radius: 0 15px 15px 0;" onclick="togglePassword('regConfirmPassword', this)"><i class="fas fa-eye text-muted"></i></span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="d-grid mt-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-user-plus me-2"></i> Register
                        </button>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <a href="#" id="showLogin" class="text-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Fallback alert container for generic JS -->
    <div class="hidden" id="alertContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword(inputId, iconSpan) {
            const input = document.getElementById(inputId);
            const icon = iconSpan.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
    <script src="admin.js"></script>
</body>
</html>
